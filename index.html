<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHEF">
<meta name="theme-color" content="#f5f0e8">
<link rel="apple-touch-icon" href="chef_logo.png">
<meta name="apple-mobile-web-app-title" content="CHEF">
<title>CHEF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#ede8de;--card:#fffdf8;--card2:#fdf8f0;--accent:#f0a500;--accent2:#e06c2a;--green:#5daa6f;--red:#d9534f;--text:#2a1f0a;--muted:#8a7a5a;--border:#d8cdb8;--shadow:0 2px 12px rgba(0,0,0,.08);--veg:#4caf50;--meat:#e07040;--fish:#2196f3;--vesper:#9c27b0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;min-height:-webkit-fill-available;}
.serif{font-family:'Cormorant Garamond',serif;}
input,textarea,select{background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:15px;width:100%;outline:none;transition:border .2s;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--accent);}
::placeholder{color:var(--muted);}
button{cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;border:none;-webkit-appearance:none;}
.btn{padding:12px 22px;border-radius:11px;font-size:14px;font-weight:600;}
.btn-primary{background:var(--accent);color:#1a1108;}.btn-primary:active{background:#c8890a;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}.btn-ghost:active{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#fff;}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--red);}.btn-danger:active{background:var(--red);color:#fff;}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);}
.tag{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--muted);}
.label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.page{display:none;animation:fadeUp .28s ease;}.page.active{display:block;}.page-flex-active{display:none;}.page-flex-active.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}#kb-kategorien{display:none;}#kb-kategorien.kb-visible{display:flex;flex-direction:column;flex:1;overflow:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeUp .2s;}
.modal-box{background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:24px;max-height:88vh;overflow-y:auto;border-top:2px solid var(--accent);}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .18s;cursor:pointer;}
.check-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#1a1108;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.week-slot{background:var(--surface);border:1.5px dashed var(--border);border-radius:8px;padding:6px 8px;cursor:pointer;min-height:48px;display:flex;flex-direction:column;justify-content:center;transition:all .18s;font-size:11px;}
.week-slot.drag-over{border-color:var(--accent);background:rgba(240,165,0,.1);transform:scale(1.02);}
.week-slot.dragging{opacity:.5;}
.week-slot.veg-slot{border-style:solid;border-color:var(--veg);background:rgba(76,175,80,.05);}
.week-slot.meat-slot{border-style:solid;border-color:var(--meat);background:rgba(224,112,64,.05);}
.week-slot.fish-slot{border-style:solid;border-color:var(--fish);background:rgba(33,150,243,.05);}
.week-slot.vesper-slot{border-style:solid;border-color:var(--vesper);background:rgba(156,39,176,.05);}
.week-slot:active{opacity:.8;}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
#app{max-width:520px;margin:0 auto;height:100vh;height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden;}
header{padding:14px 18px 0;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}


.nav-btn{flex:1;padding:9px 4px;border-radius:10px 10px 0 0;background:transparent;color:var(--muted);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border:1.5px solid transparent;border-bottom:none;transition:all .18s;}
.nav-btn.active{background:var(--card);color:var(--accent);border-color:var(--border);}
.nav-btn .ni{font-size:19px;}
main{flex:1;padding:12px;overflow:hidden;display:flex;flex-direction:column;}
.bottom-bar{width:100%;background:var(--bg);border-top:1.5px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;z-index:100;flex-shrink:0;}
.bottom-btn{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;transition:all .18s;}
.bottom-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(240,165,0,.08);}

.sub-btn{flex:1;padding:9px 8px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .18s;text-align:center;}
.sub-btn.active{background:var(--card);color:var(--accent);border-color:var(--accent);}
#api-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.api-card{max-width:400px;width:100%;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.recipe-card{transition:transform .15s;}.recipe-card:active{transform:scale(.98);}
*{scrollbar-width:none;-ms-overflow-style:none;}::-webkit-scrollbar{display:none;}
.type-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;}
.type-badge.veg{background:rgba(76,175,80,.12);color:var(--veg);border:1px solid rgba(76,175,80,.3);}
.type-badge.meat{background:rgba(224,112,64,.12);color:var(--meat);border:1px solid rgba(224,112,64,.3);}
.type-badge.fish{background:rgba(33,150,243,.12);color:var(--fish);border:1px solid rgba(33,150,243,.3);}
.type-toggle{display:flex;gap:6px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px 4px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .18s;text-align:center;}
.type-btn.sel-veg{background:rgba(76,175,80,.12);color:var(--veg);border-color:var(--veg);}
.type-btn.sel-meat{background:rgba(224,112,64,.12);color:var(--meat);border-color:var(--meat);}
.type-btn.sel-fish{background:rgba(33,150,243,.12);color:var(--fish);border-color:var(--fish);}
.plan-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:var(--surface);border-radius:12px;padding:10px 12px;}
.plan-row label{flex:1;font-size:13px;color:var(--text);}
.plan-row input[type=number]{width:52px;text-align:center;padding:6px 4px;font-size:14px;}
.day-time-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.day-time-row:last-child{border-bottom:none;}
.day-label{width:30px;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;}
.time-input-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.time-input-wrap input[type=number]{width:58px;padding:7px 6px;font-size:13px;text-align:center;}
.time-unit{font-size:12px;color:var(--muted);white-space:nowrap;}
.time-any-btn{padding:7px 10px;border-radius:8px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;}
.time-any-btn.active{background:rgba(240,165,0,.1);color:var(--accent);border-color:var(--accent);}
.portion-scaler{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.portion-btn{width:40px;height:40px;background:var(--card2);border:none;color:var(--accent);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.portion-btn:active{background:var(--accent);color:#1a1108;}
.portion-num{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--text);padding:0 8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.sync-dot.ok{background:var(--green);}.sync-dot.busy{background:var(--accent);animation:pulse 1s infinite;}.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div id="api-screen">
  <div class="card api-card" style="position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:28px;">
<img src="chef_logo.png" alt="CHEF" style="width:260px;height:auto;border-radius:12px;margin-bottom:4px;">
      <p style="color:var(--muted);font-size:13px;margin-top:5px;">Deine persönliche Küchen-Assistentin mit KI</p>
    </div>
    <label class="label">Anthropic API-Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-…" style="margin-bottom:12px;font-size:13px;">
    <label class="label">JSONBin API-Key</label>
    <input type="password" id="jb-key-input" placeholder="$2a$10$…" style="margin-bottom:8px;font-size:13px;">
    <p style="font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.6;">🔒 Beide Keys werden nur lokal gespeichert.<br>Anthropic: <a href="https://console.anthropic.com/keys" target="_blank" style="color:var(--accent);text-decoration:none;">console.anthropic.com/keys</a></p>
    <div id="api-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;">⚠️ Bitte beide API-Keys eingeben.</div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px;font-size:15px;" onclick="startApp()">App starten →</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:13px;" onclick="startDemo()">Demo starten</button>
    <div class="divider"></div>
    <p style="font-size:11px;color:var(--muted);text-align:center;line-height:1.7;">Gehostet auf GitHub Pages · Als App auf Homescreen speichern</p>
  </div>
</div>
<div id="app" style="display:none;position:relative;z-index:1;">
  <header style="padding:14px 18px 10px;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;">
    <div style="display:flex;justify-content:center;align-items:center;position:relative;">
      <span id="sync-status" style="position:absolute;left:0;font-size:11px;color:var(--muted);display:flex;align-items:center;"></span>
      <img src="chef_logo.png" alt="CHEF" onclick="showKeyModal()" style="height:72px;width:auto;border-radius:10px;cursor:pointer;transition:transform .15s;" ontouchstart="this.style.transform='scale(.95)'" ontouchend="this.style.transform=''">
    </div>
  </header>
  <main>
    <!-- STARTSEITE -->
    <div id="page-start" class="page page-flex-active active">
      <div style="display:flex;flex-direction:column;gap:12px;flex:1;">
        <button onclick="showMain('wochenplan')" style="background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:0 24px;display:flex;align-items:center;gap:20px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);width:100%;text-align:left;flex:1;">
          <div style="font-size:52px;">📅</div>
          <div>
            <div style="font-family:'Bebas Neue','Oswald',sans-serif;font-size:24px;color:var(--accent);letter-spacing:2px;">WOCHENPLAN</div>
            <div style="font-size:13px;color:var(--muted);">Mittag & Vesper planen · Einkauf</div>
          </div>
        </button>
        <button onclick="showMain('kochbuch')" style="background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:0 24px;display:flex;align-items:center;gap:20px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);width:100%;text-align:left;flex:1;">
          <div style="font-size:52px;">📖</div>
          <div>
            <div style="font-family:'Bebas Neue','Oswald',sans-serif;font-size:24px;color:var(--accent);letter-spacing:2px;">KOCHBUCH</div>
            <div style="font-size:13px;color:var(--muted);">Rezepte durchstöbern & hinzufügen</div>
          </div>
        </button>
        <button onclick="showMain('einkauf')" style="background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:0 24px;display:flex;align-items:center;gap:20px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);width:100%;text-align:left;flex:1;">
          <div style="font-size:52px;">🛒</div>
          <div>
            <div style="font-family:'Bebas Neue','Oswald',sans-serif;font-size:24px;color:var(--accent);letter-spacing:2px;">EINKAUF</div>
            <div style="font-size:13px;color:var(--muted);">Einkaufsliste verwalten</div>
          </div>
        </button>
        <button style="background:var(--card);border:1.5px dashed var(--border);border-radius:20px;padding:0 24px;display:flex;align-items:center;gap:20px;cursor:default;box-shadow:var(--shadow);width:100%;text-align:left;flex:1;opacity:.5;">
          <div style="font-size:52px;">⭐</div>
          <div>
            <div style="font-family:'Bebas Neue','Oswald',sans-serif;font-size:24px;color:var(--muted);letter-spacing:2px;">RESERVE</div>
            <div style="font-size:13px;color:var(--muted);">Demnächst verfügbar</div>
          </div>
        </button>
      </div>
    </div>

    <!-- WOCHENPLAN -->
    <div id="page-wochenplan" class="page page-flex-active" style="overflow:hidden;">
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-shrink:0;">
        <button class="sub-btn active" id="wp-tab-mittag" onclick="showWpTab('mittag')">🍽️ Mittag</button>
        <button class="sub-btn" id="wp-tab-vesper" onclick="showWpTab('vesper')">🍎 Vesper</button>
        <div id="wp-tab-einkauf" style="display:none;"></div>
      </div>
      <div id="wp-mittag" style="flex-direction:column;flex:1;overflow:hidden;display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--surface);border-radius:12px;padding:8px 12px;flex-shrink:0;">
          <button onclick="changeCalWeek(-1)" id="cal-prev" style="background:none;border:none;font-size:22px;color:var(--accent);cursor:pointer;padding:0 8px;">‹</button>
          <span id="cal-month" style="font-size:13px;font-weight:600;color:var(--text);"></span>
          <button onclick="changeCalWeek(1)" id="cal-next" style="background:none;border:none;font-size:22px;color:var(--accent);cursor:pointer;padding:0 8px;">›</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-shrink:0;">
          <button class="sub-btn active" id="woche-tab-1" onclick="showWocheTab(1)">Woche 1</button>
          <button class="sub-btn" id="woche-tab-2" onclick="showWocheTab(2)">Woche 2</button>
        </div>
        <div style="display:flex;gap:8px;align-items:stretch;flex:1;padding-bottom:12px;">
          <div id="week-grid" style="flex:1;display:flex;flex-direction:column;gap:6px;"></div>
          <button class="btn btn-primary" id="planen-btn" onclick="openAutoPlan()" style="writing-mode:vertical-rl;padding:14px 10px;font-size:13px;font-weight:700;border-radius:12px;white-space:nowrap;flex-shrink:0;">Planen</button>
        </div>
      </div>
      <div id="wp-vesper" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-shrink:0;">
          <div class="sub-btn active" style="pointer-events:none;">🧀 Salzig</div>
          <div class="sub-btn active" style="pointer-events:none;">🍰 Süß</div>
        </div>
        <div style="display:flex;gap:8px;align-items:stretch;flex:1;padding-bottom:12px;">
          <div id="vesper-grid" style="flex:1;display:flex;flex-direction:column;gap:6px;"></div>
          <button class="btn btn-primary" id="vesper-planen-btn" onclick="openVesperPlan()" style="writing-mode:vertical-rl;padding:14px 10px;font-size:13px;font-weight:700;border-radius:12px;white-space:nowrap;flex-shrink:0;">Planen</button>
        </div>
      </div>
      <div id="wp-einkauf" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="card" style="margin-bottom:16px;">
          <h3 style="font-size:14px;margin-bottom:10px;font-weight:600;">➕ Artikel hinzufügen</h3>
          <div style="display:grid;grid-template-columns:1fr 90px;gap:8px;margin-bottom:8px;">
            <input type="text" id="new-item" placeholder="Artikel" onkeydown="if(event.key==='Enter')addManualItem()">
            <input type="text" id="new-amount" placeholder="Menge" onkeydown="if(event.key==='Enter')addManualItem()">
          </div>
          <button class="btn btn-primary" style="width:100%;" onclick="addManualItem()">Hinzufügen</button>
        </div>
        <div id="shopping-list-container" style="overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;"></div>
      </div>
    </div>

    <!-- KOCHBUCH -->
    <div id="page-kochbuch" class="page page-flex-active" style="overflow:hidden;">
      <div id="kb-kategorien">
        <div style="display:flex;gap:8px;margin-bottom:8px;flex-shrink:0;">
          <div style="position:relative;flex:1;">
            <input type="text" id="kb-global-search" placeholder="🔍 Rezept suchen… z.B. Nudeln Hühnchen" oninput="globalKbSearch(this.value)" style="padding-right:42px;margin-bottom:0;">
            <button onclick="showSearchInfo()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--accent);color:#1a1108;border:none;border-radius:50%;width:24px;height:24px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;">ℹ</button>
          </div>
          <button class="btn btn-primary" style="font-size:12px;padding:8px 14px;white-space:nowrap;" onclick="showAddFromKategorienMain()">+ Neu</button>
        </div>
        <div id="kb-global-results" style="display:none;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;">
          <button onclick="showKategorie('fleisch')" style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;box-shadow:var(--shadow);">
            <img src="icons/Steak.png" style="width:60px;height:60px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="font-size:52px;display:none;">🥩</div><div style="font-size:11px;font-weight:600;color:var(--text);text-align:center;">Fleischgerichte</div>
          </button>
          <button onclick="showKategorie('nudeln')" style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;box-shadow:var(--shadow);">
            <img src="icons/Spaghetti.png" style="width:60px;height:60px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="font-size:52px;display:none;">🍜</div><div style="font-size:11px;font-weight:600;color:var(--text);text-align:center;">Nudelgerichte</div>
          </button>
          <button onclick="showKategorie('reis')" style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;box-shadow:var(--shadow);">
            <img src="icons/Reis.png" style="width:60px;height:60px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="font-size:52px;display:none;">🍚</div><div style="font-size:11px;font-weight:600;color:var(--text);text-align:center;">Reisgerichte</div>
          </button>

<script>
const TYPES={vegetarian:{icon:'🥦',label:'Vegetarisch',color:'var(--veg)',css:'veg'},meat:{icon:'🥩',label:'Fleisch',color:'var(--meat)',css:'meat'},fish:{icon:'🐟',label:'Fisch',color:'var(--fish)',css:'fish'}};
const typeIcon=t=>(TYPES[t]||TYPES.vegetarian).icon;
const typeBadge=t=>{const d=TYPES[t]||TYPES.vegetarian;return`<span class="type-badge ${d.css}">${d.icon} ${d.label}</span>`;};
const slotClass=t=>t?(TYPES[t]||TYPES.vegetarian).css+'-slot':'';
let API_KEY='',recipes=[],vesperRecipes=[],shoppingList=[],weekPlan={week1:{},week2:{}},vesperPlan={},formData={},formContext='mittag',currentTab='vesper',currentSubTab='mittag';
const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'],WEEKDAYS=['Mo','Di','Mi','Do','Fr'];
let daySettings={Mo:{maxMin:40},Di:{maxMin:40},Mi:{maxMin:40},Do:{maxMin:40},Fr:{maxMin:null}};
function setSyncStatus(s,t){const el=document.getElementById('sync-status');if(!el)return;el.innerHTML=`<span class="sync-dot ${s}"></span>${t}`;}
async function saveAll(){
  setSyncStatus('busy','Speichert…');
  try{
    const data={mittag:recipes,vesper:vesperRecipes};
    await jbSave(data);
    localStorage.setItem('ka_shopping',JSON.stringify(shoppingList));
    localStorage.setItem('ka_week',JSON.stringify(weekPlan));
    localStorage.setItem('ka_vesperplan',JSON.stringify(vesperPlan));
    localStorage.setItem('ka_daysettings',JSON.stringify(daySettings));
    setSyncStatus('ok','Gespeichert');setTimeout(()=>{const el=document.getElementById('sync-status');if(el)el.innerHTML='';},2000);
  }catch(e){setSyncStatus('err','Fehler');}
}
async function loadAll(){
  const jbData=await jbLoad();
  if(jbData&&jbData.mittag){recipes=jbData.mittag;vesperRecipes=jbData.vesper||[];}
  else{recipes=defaultRecipes();vesperRecipes=defaultVesperRecipes();}
  try{shoppingList=JSON.parse(localStorage.getItem('ka_shopping'))||[];}catch(e){shoppingList=[];}
  try{const wp=JSON.parse(localStorage.getItem('ka_week'));weekPlan=(wp&&wp.week1)?wp:{week1:wp||{},week2:{}};}catch(e){weekPlan={week1:{},week2:{}};}
  try{vesperPlan=JSON.parse(localStorage.getItem('ka_vesperplan'))||{};}catch(e){vesperPlan={};}
  try{const d=JSON.parse(localStorage.getItem('ka_daysettings'));if(d)daySettings=d;}catch(e){}
}
function defaultRecipes(){return[{id:'r1',name:'Spaghetti Carbonara',image:null,time:'25 min',servings:2,type:'meat',tags:['Pasta','Schnell'],ingredients:[{name:'Spaghetti',amount:'200g'},{name:'Pancetta',amount:'100g'},{name:'Eier',amount:'2 Stück'},{name:'Parmesan',amount:'60g'},{name:'Pfeffer',amount:'n. B.'}],steps:['Spaghetti in Salzwasser al dente kochen.','Pancetta knusprig braten.','Eier mit Parmesan verquirlen.','Pasta vom Herd, Ei-Mix unterrühren.','Mit Pfeffer servieren.']},{id:'r2',name:'Avocado Toast',image:null,time:'10 min',servings:1,type:'vegetarian',tags:['Schnell'],ingredients:[{name:'Vollkornbrot',amount:'2 Scheiben'},{name:'Avocado',amount:'1 Stück'},{name:'Zitronensaft',amount:'1 EL'},{name:'Chiliflocken',amount:'Prise'}],steps:['Brot rösten.','Avocado zerdrücken und würzen.','Auf Toast verteilen.','Mit Chili bestreuen.']},{id:'r3',name:'Lachsfilet mit Gemüse',image:null,time:'30 min',servings:2,type:'fish',tags:['Gesund'],ingredients:[{name:'Lachsfilet',amount:'300g'},{name:'Zucchini',amount:'1 Stück'},{name:'Zitrone',amount:'1/2'},{name:'Olivenöl',amount:'2 EL'},{name:'Dill',amount:'n. B.'}],steps:['Ofen auf 200°C vorheizen.','Gemüse schneiden und auf Backblech legen.','Lachs würzen und mit Zitrone beträufeln.','Alles 20 Min. backen.','Mit frischem Dill servieren.']}];}
function defaultVesperRecipes(){return[{id:'v1',name:'Apfel mit Käse',image:null,time:'5 min',servings:1,type:'vegetarian',tags:['Schnell','Kinder'],ingredients:[{name:'Apfel',amount:'1 Stück'},{name:'Käse',amount:'2 Scheiben'}],steps:['Apfel in Spalten schneiden.','Mit Käse servieren.']}];}
const JSONBIN_ID='69bfcf84aa77b81da909b064';
let JB_KEY='';
async function jbLoad(){try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{'X-Master-Key':JB_KEY,'X-Bin-Meta':false}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
async function jbSave(data){console.log('jbSave called, JB_KEY length:',JB_KEY.length);try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JB_KEY},body:JSON.stringify(data)});console.log('jbSave status:',r.status);}catch(e){console.warn('JSONBin save failed',e);}}
window.onload=async()=>{const k=localStorage.getItem('ka_key');const jk=localStorage.getItem('ka_jb');if(k&&jk){API_KEY=k;JB_KEY=jk;await loadAll();launchApp();}};
function startDemo(){
  API_KEY='demo';JB_KEY='demo';
  recipes=defaultRecipes();vesperRecipes=defaultVesperRecipes();
  shoppingList=[];weekPlan={week1:{},week2:{}};vesperPlan={};
  launchApp();
  toast('Demo-Modus — Änderungen werden nicht gespeichert');
}
function startApp(){const k=document.getElementById('api-key-input').value.trim();const jk=document.getElementById('jb-key-input').value.trim();if(!k.startsWith('sk-')||!jk){document.getElementById('api-error').style.display='block';return;}API_KEY=k;JB_KEY=jk;localStorage.setItem('ka_key',k);localStorage.setItem('ka_jb',jk);loadAll().then(()=>launchApp());}
function launchApp(){
  document.getElementById('api-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  showPage('start');
}
function showPage(page){
  ['start','wochenplan','kochbuch'].forEach(p=>{
    const el=document.getElementById('page-'+p);
    if(el)el.classList.toggle('active',p===page);
  });
  // update bottom bar
  ['btn-home','btn-wochenplan','btn-kochbuch','btn-einkauf-b'].forEach(b=>{
    const el=document.getElementById(b);if(el)el.classList.remove('active');
  });
  if(page==='start')document.getElementById('btn-home')?.classList.add('active');
  if(page==='wochenplan')document.getElementById('btn-wochenplan')?.classList.add('active');
  if(page==='kochbuch')document.getElementById('btn-kochbuch')?.classList.add('active');
}
function goHome(){showPage('start');updateHomeBtn();}
let navStack=[];
function pushNav(fn){navStack.push(fn);}
function handleBack(){
  if(navStack.length>0){navStack.pop()();}
  else{goHome();}
  updateHomeBtn();
}
function updateHomeBtn(){
  const icon=document.getElementById('btn-home-icon');
  if(!icon)return;
  icon.textContent=navStack.length>0?'←':'🏠';
}
function showMain(section){
  if(section==='einkauf'){showPage('wochenplan');showWpTab('einkauf');return;}
  showPage(section);
  if(section==='wochenplan'){showWpTab('mittag');renderWeek();}
  if(section==='kochbuch'){backToKategorien();}
}
function showWpTab(tab){
  ['mittag','vesper','einkauf'].forEach(t=>{
    const el=document.getElementById('wp-'+t);if(el){if(t===tab){el.style.display=t==='einkauf'?'flex':(t==='vesper'||t==='mittag'?'flex':'block');}else{el.style.display='none';}}
    const btn=document.getElementById('wp-tab-'+t);if(btn)btn.classList.toggle('active',t===tab);
  });
  // update bottom bar
  ['btn-home','btn-wochenplan','btn-kochbuch','btn-einkauf-b'].forEach(b=>{
    const el=document.getElementById(b);if(el)el.classList.remove('active');
  });
  if(tab==='einkauf'){renderShopping();document.getElementById('btn-einkauf-b')?.classList.add('active');}
  else{document.getElementById('btn-wochenplan')?.classList.add('active');}
  if(tab==='vesper')renderVesper();
  if(tab==='mittag')renderWeek();
}
// Kochbuch navigation
const KB_CATEGORIES={
  fleisch:{label:'Fleischgerichte',icon:'🥩',filter:r=>r.type==='meat',ctx:'mittag'},
  nudeln:{label:'Nudelgerichte',icon:'🍜',filter:r=>detectCategory(r)==='nudeln',ctx:'mittag'},
  reis:{label:'Reisgerichte',icon:'🍚',filter:r=>detectCategory(r)==='reis',ctx:'mittag'},
  suppen:{label:'Suppen',icon:'🥣',filter:r=>detectCategory(r)==='suppe',ctx:'mittag'},
  grillen:{label:'Grillen',icon:'🔥',filter:r=>(r.tags||[]).some(t=>t.toLowerCase().includes('grill')),ctx:'mittag'},
  backen:{label:'Backen',icon:'🎂',filter:r=>(r.tags||[]).some(t=>t.toLowerCase().includes('back')),ctx:'mittag'},
  ofen:{label:'Ofengerichte',icon:'🫕',filter:r=>detectCategory(r)==='ofen'||(r.tags||[]).some(t=>t.toLowerCase().includes('ofen')),ctx:'mittag'},
  'vesper-kb':{label:'Vesper',icon:'🍎',filter:r=>true,ctx:'vesper'},
};
let currentKbKat=null;
function globalKbSearch(q){
  const resultsEl=document.getElementById('kb-global-results');
  const kategorienEl=document.querySelector('#kb-kategorien .kb-grid');
  if(!q.trim()){
    resultsEl.style.display='none';
    document.querySelectorAll('#kb-kategorien button[onclick*="showKategorie"]').forEach(b=>b.style.display='');
    return;
  }
  // search all recipes
  const allRecipes=[...recipes.map(r=>({...r,_ctx:'mittag'})),...vesperRecipes.map(r=>({...r,_ctx:'vesper'}))];
  const filtered=smartSearch(allRecipes,q);
  document.querySelectorAll('#kb-kategorien button[onclick*="showKategorie"]').forEach(b=>b.style.display='none');
  resultsEl.style.display='block';
  resultsEl.innerHTML=filtered.length
    ?filtered.map(r=>recipeCardHTML(r,r._ctx)).join('')
    :`<div style="text-align:center;padding:40px 20px;color:var(--muted);"><div style="font-size:36px;margin-bottom:10px;">🔍</div><p>Keine Rezepte gefunden für "${q}"</p></div>`;
}
function showKategorie(kat){
  pushNav(()=>{backToKategorien();});
  updateHomeBtn();
  currentKbKat=kat;
  const cat=KB_CATEGORIES[kat];
  document.getElementById('kb-kategorien').classList.remove('kb-visible');
  document.getElementById('kb-rezepte').style.display='block';
  document.getElementById('kb-kategorie-titel').textContent=cat.icon+' '+cat.label;
  document.getElementById('kb-search').value='';
  // Sicherstellen dass Liste und Toolbar sichtbar, Details versteckt
  const list=document.getElementById('kb-recipe-list');if(list)list.style.display='block';
  const addBtn=document.getElementById('kb-add-btn');if(addBtn)addBtn.style.display='';
  const srch=document.getElementById('kb-search');if(srch)srch.style.display='';
  const rdet=document.getElementById('kb-recipe-detail');if(rdet){rdet.style.display='none';rdet.innerHTML='';}
  const vdet=document.getElementById('kb-vesper-detail');if(vdet){vdet.style.display='none';vdet.innerHTML='';}
  const rform=document.getElementById('kb-add-form');if(rform){rform.style.display='none';}
  const vform=document.getElementById('kb-add-vesper-form');if(vform){vform.style.display='none';}
  renderKbRecipes(cat);
}
function backToKategorien(){
  document.getElementById('kb-kategorien').classList.add('kb-visible');
  navStack=[];updateHomeBtn();
  const inp=document.getElementById('kb-global-search');
  if(inp)inp.value='';
  const res=document.getElementById('kb-global-results');
  if(res)res.style.display='none';
  document.querySelectorAll('#kb-kategorien button[onclick*="showKategorie"]').forEach(b=>b.style.display='');
  const kbk=document.getElementById('kb-kategorien');kbk.classList.add('kb-visible');
  document.getElementById('kb-rezepte').style.display='none';
  // Sicher alle Detail/Form-Felder zurücksetzen
  const rdet=document.getElementById('kb-recipe-detail');if(rdet){rdet.style.display='none';rdet.innerHTML='';}
  const vdet=document.getElementById('kb-vesper-detail');if(vdet){vdet.style.display='none';vdet.innerHTML='';}
  const rform=document.getElementById('kb-add-form');if(rform){rform.style.display='none';rform.innerHTML='';}
  const vform=document.getElementById('kb-add-vesper-form');if(vform){vform.style.display='none';vform.innerHTML='';}
  const rlist=document.getElementById('kb-recipe-list');if(rlist){rlist.style.display='block';rlist.innerHTML='';}
  currentKbKat=null;
}
function renderKbRecipes(cat){
  const pool=cat.ctx==='vesper'?vesperRecipes:recipes;
  const filtered=pool.filter(cat.filter);
  document.getElementById('kb-recipe-list').innerHTML=filtered.length
    ?filtered.map(r=>recipeCardHTML(r,cat.ctx==='vesper'?'vesper':'mittag')).join('')
    :`<div style="text-align:center;padding:40px 20px;color:var(--muted);"><div style="font-size:44px;margin-bottom:12px;">${cat.icon}</div><p>Noch keine ${cat.label}.</p></div>`;
}
function filterKbRecipes(q){
  if(!currentKbKat)return;
  const cat=KB_CATEGORIES[currentKbKat];
  const pool=cat.ctx==='vesper'?vesperRecipes:recipes;
  const base=pool.filter(cat.filter);
  const filtered=smartSearch(base,q);
  document.getElementById('kb-recipe-list').innerHTML=filtered.length
    ?filtered.map(r=>recipeCardHTML(r,cat.ctx==='vesper'?'vesper':'mittag')).join('')
    :`<div style="text-align:center;padding:40px 20px;color:var(--muted);"><p>Keine Ergebnisse für "${q}"</p></div>`;
}
function showAddFromKategorienMain(){
  // Default to mittag wenn keine Kategorie gewählt
  if(!currentKbKat)currentKbKat='fleisch';
  showAddFromKategorie();
}
function showAddFromKategorie(){
  if(!currentKbKat)return;
  const cat=KB_CATEGORIES[currentKbKat];
  const ctx=cat.ctx==='vesper'?'vesper':'mittag';
  formContext=ctx;
  formData={name:'',time:'',servings:'2',tags:'',type:'vegetarian',vesperKat:'salzig',ingredients:[{name:'',amount:''}],steps:[''],image:null};
  document.getElementById('kb-recipe-list').style.display='none';
  document.getElementById('kb-recipe-detail').style.display='none';
  document.getElementById('kb-vesper-detail').style.display='none';
  document.getElementById('kb-add-btn').style.display='none';
  document.getElementById('kb-search').style.display='none';
  const formId=ctx==='vesper'?'kb-add-vesper-form':'kb-add-form';
  renderKbAddForm(ctx,formId);
  document.getElementById(formId).style.display='block';
}
function renderKbAddForm(ctx,formId){
  const isV=ctx==='vesper';
  document.getElementById(formId).innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 class="serif" style="font-size:22px;">${formData.editMode?(isV?'Vesper bearbeiten':'Rezept bearbeiten'):(isV?'Neues Vesper-Rezept':'Neues Rezept')}</h2>
      <button class="btn btn-ghost" onclick="backFromKbForm('${ctx}')">Abbrechen</button>
    </div>
    <div onclick="document.getElementById('photo-input-kb-${ctx}').click()"
      style="width:100%;height:120px;border-radius:16px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;overflow:hidden;position:relative;background:${formData.image?`url(${formData.image}) center/cover`:'var(--surface)'};">
      ${formData.image?`<div style="position:absolute;bottom:8px;right:8px;background:var(--green);color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;">✓ KI analysiert</div>`:`<div style="font-size:28px;margin-bottom:4px;">📷</div><div style="font-size:13px;color:var(--muted);">Foto für KI-Analyse</div>`}
      <div id="ai-overlay-kb-${ctx}" style="display:none;position:absolute;inset:0;background:rgba(245,240,232,.9);align-items:center;justify-content:center;flex-direction:column;gap:10px;"><div class="spinner"></div><div style="font-size:13px;color:var(--accent);font-weight:600;">KI analysiert…</div></div>
    </div>
    <input type="file" id="photo-input-kb-${ctx}" accept="image/*" capture="environment" style="display:none;" onchange="handlePhotoKb(event,'${ctx}')">
    <label class="label">Art des Gerichts</label>
    <div class="type-toggle">
      <button class="type-btn ${formData.type==='vegetarian'?'sel-veg':''}" onclick="formData.type='vegetarian';renderKbAddForm('${ctx}','${formId}')">🥦 Veg.</button>
      <button class="type-btn ${formData.type==='meat'?'sel-meat':''}" onclick="formData.type='meat';renderKbAddForm('${ctx}','${formId}')">🥩 Fleisch</button>

function addStepRowKb(ctx,formId){syncFields();formData.steps.push('');renderKbAddForm(ctx,formId);}

function autoAssignKategorie(r,ctx){
  if(ctx==='vesper')return;
  const text=(r.name+' '+(r.tags||[]).join(' ')+' '+(r.ingredients||[]).map(i=>i.name).join(' ')).toLowerCase();
  if(/back|kuchen|torte|brot|muffin|cookie|keks/.test(text)&&!r.tags.includes('Backen'))r.tags.push('Backen');
  if(/grill|bbq|barbecue/.test(text)&&!r.tags.includes('Grillen'))r.tags.push('Grillen');
  if(/ofen|auflauf|überbacken/.test(text)&&!r.tags.includes('Ofen'))r.tags.push('Ofen');
  if(/suppe|eintopf|brühe/.test(text)&&!r.tags.includes('Suppe'))r.tags.push('Suppe');
}
function saveRecipeKb(ctx,formId){
  syncFields();if(!formData.name.trim()){toast('⚠️ Bitte Rezeptname eingeben');return;}
  const rid=formData.editMode?formData.id:((ctx==='vesper'?'v':'r')+Date.now());
  const r={id:rid,name:formData.name.trim(),type:formData.type||'vegetarian',time:formData.time||'?',servings:parseInt(formData.servings)||2,tags:formData.tags.split(',').map(t=>t.trim()).filter(Boolean),ingredients:formData.ingredients.filter(i=>i.name.trim()),steps:formData.steps.filter(s=>s.trim()),image:null,vesperKat:ctx==='vesper'?(formData.vesperKat||'salzig'):undefined};
  autoAssignKategorie(r,ctx);
  if(formData.editMode){
    if(ctx==='vesper'){const idx=vesperRecipes.findIndex(x=>x.id===r.id);if(idx>=0)vesperRecipes[idx]=r;}
    else{const idx=recipes.findIndex(x=>x.id===r.id);if(idx>=0)recipes[idx]=r;}
    toast('✓ Rezept aktualisiert!');
  } else {
    if(ctx==='vesper')vesperRecipes.push(r);else recipes.push(r);
    toast('✓ Rezept gespeichert!');
  }
  saveAll();backFromKbForm(ctx);
}
async function handlePhotoKb(e,ctx){
  const file=e.target.files[0];if(!file)return;
  formData.image=URL.createObjectURL(file);
  const ov=document.getElementById('ai-overlay-kb-'+ctx);if(ov)ov.style.display='flex';
  const formId=ctx==='vesper'?'kb-add-vesper-form':'kb-add-form';
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const b64=ev.target.result.split(',')[1];
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:`Analysiere dieses Essensfoto. Antworte NUR mit validem JSON:
{"name":"Name","type":"vegetarian OR meat OR fish","time":"10 min","servings":2,"tags":["Tag"],"ingredients":[{"name":"Zutat","amount":"Menge"}],"steps":["Schritt"]}
Max 5 Schritte auf Deutsch.`}]}]})});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const data=await resp.json();const p=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
      if(p.name)formData.name=p.name;if(p.type&&TYPES[p.type])formData.type=p.type;if(p.time)formData.time=p.time;if(p.servings)formData.servings=String(p.servings);if(p.tags)formData.tags=p.tags.join(', ');if(p.ingredients?.length)formData.ingredients=p.ingredients;if(p.steps?.length)formData.steps=p.steps;
    }catch(err){formData.aiError='⚠️ KI-Analyse fehlgeschlagen: '+(err.message||'Fehler');}
    renderKbAddForm(ctx,formId);
  };reader.readAsDataURL(file);
}

function expandSynonyms(term){
  const t=term.toLowerCase();
  const syns=SYNONYMS[t]||[];
  return[t,...syns];
}

function smartSearch(recipes, query){
  if(!query.trim())return recipes;
  const terms=query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  return recipes.filter(r=>{
    const searchText=(r.name+' '+(r.tags||[]).join(' ')+' '+(r.ingredients||[]).map(i=>i.name).join(' ')+' '+(r.steps||[]).join(' ')).toLowerCase();
    return terms.every(term=>{
      const variants=expandSynonyms(term);
      return variants.some(v=>searchText.includes(v));
    });
  });
}

async function handlePhoto(e,ctx){
  const file=e.target.files[0];if(!file)return;formData.image=URL.createObjectURL(file);
  const ov=document.getElementById('ai-overlay-'+ctx);if(ov)ov.style.display='flex';
  const reader=new FileReader();
  reader.onload=async(ev)=>{const b64=ev.target.result.split(',')[1];
    try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:`Analysiere dieses Essensfoto. Antworte NUR mit validem JSON:\n{"name":"Name","type":"vegetarian OR meat OR fish","time":"10 min","servings":2,"tags":["Tag"],"ingredients":[{"name":"Zutat","amount":"Menge"}],"steps":["Schritt"]}\nMax 5 Schritte auf Deutsch.`}]}]})});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const data=await resp.json();const p=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
      if(p.name)formData.name=p.name;if(p.type&&TYPES[p.type])formData.type=p.type;if(p.time)formData.time=p.time;if(p.servings)formData.servings=String(p.servings);if(p.tags)formData.tags=p.tags.join(', ');if(p.ingredients?.length)formData.ingredients=p.ingredients;if(p.steps?.length)formData.steps=p.steps;
    }catch(err){formData.aiError='⚠️ KI-Analyse fehlgeschlagen: '+(err.message||'Fehler');}
    renderAddForm(ctx);if(formData.aiError){const el=document.getElementById('ai-error-'+ctx);if(el){el.style.display='block';el.textContent=formData.aiError;}}
  };reader.readAsDataURL(file);
}

// ── Drag & Drop (Desktop + Touch/iPad) ──────────
let dragSource=null;
let touchDragEl=null, touchClone=null, touchOffX=0, touchOffY=0;

function onDragStart(e, type, day, week, kat){
  dragSource={type,day,week,kat};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, type, day, week, kat){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  doSwap(type, day, week, kat);
}
function doSwap(type, day, week, kat){
  if(!dragSource)return;
  if(type==='week'){
    const w1=`week${dragSource.week}`,w2=`week${week}`;
    if(!weekPlan[w1])weekPlan[w1]={};
    if(!weekPlan[w2])weekPlan[w2]={};
    const tmp=weekPlan[w1][dragSource.day];
    weekPlan[w1][dragSource.day]=weekPlan[w2][day];
    if(!weekPlan[w1][dragSource.day])delete weekPlan[w1][dragSource.day];
    weekPlan[w2][day]=tmp;
    if(!weekPlan[w2][day])delete weekPlan[w2][day];
    saveAll();renderWeek();
  } else if(type==='vesper'){
    const k1=dragSource.day+'-'+dragSource.kat;
    const k2=day+'-'+kat;
    const tmp=vesperPlan[k1];
    vesperPlan[k1]=vesperPlan[k2];
    if(!vesperPlan[k1])delete vesperPlan[k1];
    vesperPlan[k2]=tmp;
    if(!vesperPlan[k2])delete vesperPlan[k2];
    saveAll();renderVesper();
  }
  dragSource=null;
}

// Touch support für iPad — optimiert mit RAF + transform
let rafId=null, lastTouchX=0, lastTouchY=0;

function onTouchStart(e, type, day, week, kat){
  const touch=e.touches[0];
  touchDragEl=e.currentTarget;
  dragSource={type,day,week,kat};
  const rect=touchDragEl.getBoundingClientRect();
  touchOffX=touch.clientX-rect.left;
  touchOffY=touch.clientY-rect.top;
  touchClone=touchDragEl.cloneNode(true);
  touchClone.style.cssText=`position:fixed;width:${rect.width}px;opacity:.85;pointer-events:none;z-index:9999;border-radius:12px;left:${rect.left}px;top:${rect.top}px;will-change:transform;transition:none;box-shadow:0 8px 24px rgba(0,0,0,.2);`;
  document.body.appendChild(touchClone);
  touchDragEl.style.opacity='.35';
  lastTouchX=touch.clientX;lastTouchY=touch.clientY;
  e.preventDefault();
}

function updateClonePosition(){
  if(!touchClone)return;
  touchClone.style.left=(lastTouchX-touchOffX)+'px';
  touchClone.style.top=(lastTouchY-touchOffY)+'px';
  // highlight
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(lastTouchX,lastTouchY)?.closest('.week-slot');
  if(el&&el!==touchDragEl)el.classList.add('drag-over');
  rafId=null;
}

function onTouchMove(e){
  if(!touchClone)return;
  const touch=e.touches[0];
  lastTouchX=touch.clientX;lastTouchY=touch.clientY;
  if(!rafId)rafId=requestAnimationFrame(updateClonePosition);
  e.preventDefault();
}

function onTouchEnd(e){
  if(!touchClone)return;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const touch=e.changedTouches[0];
  if(touchDragEl)touchDragEl.style.opacity='';
  touchClone.remove();touchClone=null;
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const target=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.week-slot[data-drag]');
  if(target&&dragSource){
    const type=target.dataset.dtype;
    const day=target.dataset.day;
    const week=parseInt(target.dataset.week||currentWocheTab);
    const kat=target.dataset.kat||null;
    doSwap(type,day,week,kat);
  }
  dragSource=null;touchDragEl=null;
}

document.addEventListener('touchend',onTouchEnd);

function getWeekDates(offset){
  const now=new Date();
  const day=now.getDay()||7; // Mo=1
  const monday=new Date(now);
  monday.setDate(now.getDate()-day+1+(offset*7));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}
function formatDate(d){return d.getDate()+'.'+(d.getMonth()+1)+'.';}
function formatMonth(dates){
  const months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const first=dates[0],last=dates[6];
  if(first.getMonth()===last.getMonth()) return months[first.getMonth()]+' '+first.getFullYear();
  return months[first.getMonth()]+'/'+months[last.getMonth()]+' '+first.getFullYear();
}

function runAutoPlan(){
  const counts={};let total=0;
  for(const t of Object.keys(TYPES)){counts[t]=parseInt(document.getElementById('plan-'+t).value)||0;total+=counts[t];}
  const errEl=document.getElementById('plan-error');
  if(total>5){errEl.style.display='block';errEl.textContent='⚠️ Maximal 5 Gerichte pro Woche (Mo–Fr).';return;}
  if(total===0){errEl.style.display='block';errEl.textContent='⚠️ Bitte mindestens 1 Gericht wählen.';return;}
  for(const[t,n]of Object.entries(counts)){if(n>0&&recipes.filter(r=>r.type===t).length===0){errEl.style.display='block';errEl.textContent=`⚠️ Keine ${TYPES[t].label}-Rezepte vorhanden!`;return;}}
  function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
  let totalPlanned=0;
  for(const week of[1,2]){
    if(!weekPlan[`week${week}`])weekPlan[`week${week}`]={};
    const usedIds=new Set();const usedCats=new Set();
    const shuffled=[...WEEKDAYS].sort(()=>Math.random()-.5);
    let idx=0;const assignments=[];
    for(const[t,n]of Object.entries(counts)){for(let i=0;i<n;i++)assignments.push({day:shuffled[idx++],type:t});}
    for(const{day,type}of assignments){
      const maxMin=daySettings[day]?.maxMin;
      let pool=recipes.filter(r=>r.type===type&&!usedIds.has(r.id));
      const poolByCat=pool.filter(r=>!usedCats.has(detectCategory(r)));
      if(poolByCat.length>0)pool=poolByCat;
      if(maxMin){const f=pool.filter(r=>{const m=parseMinutes(r.time);return m===null||m<=maxMin;});if(f.length>0)pool=f;}
      if(pool.length===0)pool=recipes.filter(r=>r.type===type);
      const chosen=pick(pool);
      weekPlan[`week${week}`][day]=chosen;
      usedIds.add(chosen.id);usedCats.add(detectCategory(chosen));
      totalPlanned++;
    }
  }
  saveAll();closeAutoPlan();renderWeek();toast(`✓ ${totalPlanned} Gerichte für 2 Wochen geplant!`);
  updatePlanenBtnHeight();
}

      </div>
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">🧄 Zutaten</div>
        ${r.ingredients.map(ing=>`<div style="display:flex;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);"><span style="color:var(--accent);font-weight:500;min-width:70px;">${escHtml(ing.amount)}</span><span style="padding-left:8px;">${escHtml(ing.name)}</span></div>`).join('')}
      </div>
      <div style="margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">👩‍🍳 Zubereitung</div>
        ${r.steps.map((s,i)=>`<div style="display:flex;gap:10px;margin-bottom:10px;"><div class="step-num">${i+1}</div><p style="font-size:13px;line-height:1.6;padding-top:3px;">${escHtml(s)}</p></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;">
        <button class="btn btn-ghost" onclick="closeSlotDetail();${type==='week'?`openPicker('${day}',${week||'currentWocheTab'})`:`openVesperPicker('${day}','${kat||'salzig'}')`}">🔄 Ändern</button>
        <button class="btn btn-primary" onclick="closeSlotDetail();editRecipeFromSlot('${r.id}','${r.type==='vesper'?'vesper':'mittag'}')">✏️ Bearbeiten</button>
      </div>
    </div>
  </div>`;
}
function closeSlotDetail(){const m=document.getElementById('slot-detail-modal');if(m)m.style.display='none';}
function editRecipeFromSlot(id,ctx){
  // Ins Kochbuch navigieren und direkt Edit-Formular öffnen
  showMain('kochbuch');
  // Kategorie raten anhand Rezept-ID
  const pool=ctx==='vesper'?vesperRecipes:recipes;
  const r=pool.find(x=>x.id===id);
  if(!r)return;
  // Kategorie bestimmen
  let kat='fleisch';
  if(ctx==='vesper')kat='vesper-kb';
  else if(detectCategory(r)==='nudeln')kat='nudeln';
  else if(detectCategory(r)==='reis')kat='reis';
  else if(detectCategory(r)==='suppe')kat='suppen';
  else if((r.tags||[]).some(t=>t.toLowerCase().includes('grill')))kat='grillen';
  else if((r.tags||[]).some(t=>t.toLowerCase().includes('back')))kat='backen';
  else if(detectCategory(r)==='ofen'||(r.tags||[]).some(t=>t.toLowerCase().includes('ofen')))kat='ofen';
  // Kategorie öffnen und dann Rezept bearbeiten
  setTimeout(()=>{
    showKategorie(kat);
    setTimeout(()=>editKbRecipe(id,ctx),100);
  },100);
}
function openPicker(day,week){week=week||currentWocheTab;const maxMin=daySettings[day]?.maxMin;const usedInWeek=Object.values(weekPlan[`week${week}`]||{}).map(r=>r?.id);const modal=document.getElementById('picker-modal');modal.style.display='block';modal.innerHTML=`<div class="modal-overlay" onclick="closePicker()"><div class="modal-box" onclick="event.stopPropagation()"><div class="serif" style="font-size:19px;margin-bottom:4px;">Rezept wählen</div><p style="font-size:12px;color:var(--muted);margin-bottom:16px;">${day} · Woche ${week}${maxMin?` · <span style="color:var(--green)">⏱ max ${maxMin} min</span>`:''}</p>${recipes.length?recipes.map(r=>{const mins=parseMinutes(r.time),ot=maxMin&&mins!==null&&mins>maxMin,used=usedInWeek.includes(r.id);return`<div class="card recipe-card" style="cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:13px;${ot||used?'opacity:.55':''}" onclick="assignSlot('${day}',${week},'${r.id}')"><div style="font-size:24px;">${typeIcon(r.type)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${escHtml(r.name)}</div><div style="font-size:11px;color:${ot?'var(--red)':used?'var(--muted)':'var(--muted)'};">${r.time}${ot?' ⚠️':''}${used?' · bereits diese Woche':''}</div></div>${typeBadge(r.type)}</div>`;}).join(''):`<p style="color:var(--muted);text-align:center;padding:20px;">Noch keine Rezepte.</p>`}<button class="btn btn-ghost" style="width:100%;margin-top:10px;" onclick="closePicker()">Abbrechen</button></div></div>`;}
function closePicker(){document.getElementById('picker-modal').style.display='none';}
function assignSlot(day,week,rid){if(!weekPlan[`week${week}`])weekPlan[`week${week}`]={};weekPlan[`week${week}`][day]=recipes.find(x=>x.id===rid);saveAll();closePicker();renderWeek();}
function openVesperPicker(day,kat){kat=kat||'salzig';const pool=vesperRecipes.filter(r=>(r.vesperKat||'salzig')===kat);const modal=document.getElementById('picker-modal');modal.style.display='block';modal.innerHTML=`<div class="modal-overlay" onclick="closePicker()"><div class="modal-box" onclick="event.stopPropagation()"><div class="serif" style="font-size:19px;margin-bottom:4px;">${kat==='salzig'?'🧀 Salzig':'🍰 Süß'} wählen</div><p style="font-size:12px;color:var(--muted);margin-bottom:16px;">${day}</p>${pool.length?pool.map(r=>`<div class="card recipe-card" style="cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:13px;" onclick="assignVesperSlot('${day}','${kat}','${r.id}')"><div style="font-size:24px;">${typeIcon(r.type)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${escHtml(r.name)}</div><div style="font-size:11px;color:var(--muted);">${r.time} · ${r.servings} Port.</div></div>${typeBadge(r.type)}</div>`).join(''):`<p style="color:var(--muted);text-align:center;padding:20px;">Keine ${kat==='salzig'?'salzigen':'süßen'} Vesper-Rezepte.<br><span style="font-size:11px;">📖 Rezepte → Vesper → Hinzufügen</span></p>`}<button class="btn btn-ghost" style="width:100%;margin-top:10px;" onclick="closePicker()">Abbrechen</button></div></div>`;}
function assignVesperSlot(day,kat,rid){vesperPlan[day+'-'+(kat||'salzig')]=vesperRecipes.find(x=>x.id===rid);saveAll();closePicker();renderVesper();}
</script>
