<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KochApp">
<meta name="theme-color" content="#f5f0e8">
<title>🍳 KochApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#ede8de;--card:#fffdf8;--card2:#fdf8f0;--accent:#f0a500;--accent2:#e06c2a;--green:#5daa6f;--red:#d9534f;--text:#2a1f0a;--muted:#8a7a5a;--border:#d8cdb8;--shadow:0 2px 12px rgba(0,0,0,.08);--veg:#4caf50;--meat:#e07040;--fish:#2196f3;--vesper:#9c27b0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;min-height:-webkit-fill-available;}
.serif{font-family:'Cormorant Garamond',serif;}
input,textarea,select{background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:15px;width:100%;outline:none;transition:border .2s;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--accent);}
::placeholder{color:var(--muted);}
button{cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;border:none;-webkit-appearance:none;}
.btn{padding:12px 22px;border-radius:11px;font-size:14px;font-weight:600;}
.btn-primary{background:var(--accent);color:#1a1108;}.btn-primary:active{background:#c8890a;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}.btn-ghost:active{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#fff;}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--red);}.btn-danger:active{background:var(--red);color:#fff;}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);}
.tag{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--muted);}
.label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.page{display:none;animation:fadeUp .28s ease;}.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeUp .2s;}
.modal-box{background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:24px;max-height:88vh;overflow-y:auto;border-top:2px solid var(--accent);}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .18s;cursor:pointer;}
.check-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#1a1108;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.week-slot{background:var(--surface);border:1.5px dashed var(--border);border-radius:12px;padding:10px;cursor:pointer;min-height:75px;display:flex;flex-direction:column;justify-content:space-between;transition:all .18s;font-size:11px;}
.week-slot.veg-slot{border-style:solid;border-color:var(--veg);background:rgba(76,175,80,.05);}
.week-slot.meat-slot{border-style:solid;border-color:var(--meat);background:rgba(224,112,64,.05);}
.week-slot.fish-slot{border-style:solid;border-color:var(--fish);background:rgba(33,150,243,.05);}
.week-slot.vesper-slot{border-style:solid;border-color:var(--vesper);background:rgba(156,39,176,.05);}
.week-slot:active{opacity:.8;}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header{padding:14px 18px 0;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
nav{display:flex;gap:3px;}
.nav-btn{flex:1;padding:9px 4px;border-radius:10px 10px 0 0;background:transparent;color:var(--muted);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border:1.5px solid transparent;border-bottom:none;transition:all .18s;}
.nav-btn.active{background:var(--card);color:var(--accent);border-color:var(--border);}
.nav-btn .ni{font-size:19px;}
main{flex:1;padding:18px 16px 90px;overflow-y:auto;}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--bg);border-top:1.5px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.bottom-btn{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;transition:all .18s;}
.bottom-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(240,165,0,.08);}
.sub-nav{display:flex;gap:8px;margin-bottom:16px;}
.sub-btn{flex:1;padding:9px 8px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .18s;text-align:center;}
.sub-btn.active{background:var(--card);color:var(--accent);border-color:var(--accent);}
#api-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.api-card{max-width:400px;width:100%;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.recipe-card{transition:transform .15s;}.recipe-card:active{transform:scale(.98);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.type-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;}
.type-badge.veg{background:rgba(76,175,80,.12);color:var(--veg);border:1px solid rgba(76,175,80,.3);}
.type-badge.meat{background:rgba(224,112,64,.12);color:var(--meat);border:1px solid rgba(224,112,64,.3);}
.type-badge.fish{background:rgba(33,150,243,.12);color:var(--fish);border:1px solid rgba(33,150,243,.3);}
.type-toggle{display:flex;gap:6px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px 4px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .18s;text-align:center;}
.type-btn.sel-veg{background:rgba(76,175,80,.12);color:var(--veg);border-color:var(--veg);}
.type-btn.sel-meat{background:rgba(224,112,64,.12);color:var(--meat);border-color:var(--meat);}
.type-btn.sel-fish{background:rgba(33,150,243,.12);color:var(--fish);border-color:var(--fish);}
.plan-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:var(--surface);border-radius:12px;padding:10px 12px;}
.plan-row label{flex:1;font-size:13px;color:var(--text);}
.plan-row input[type=number]{width:52px;text-align:center;padding:6px 4px;font-size:14px;}
.day-time-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.day-time-row:last-child{border-bottom:none;}
.day-label{width:30px;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;}
.time-input-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.time-input-wrap input[type=number]{width:58px;padding:7px 6px;font-size:13px;text-align:center;}
.time-unit{font-size:12px;color:var(--muted);white-space:nowrap;}
.time-any-btn{padding:7px 10px;border-radius:8px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;}
.time-any-btn.active{background:rgba(240,165,0,.1);color:var(--accent);border-color:var(--accent);}
.portion-scaler{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.portion-btn{width:40px;height:40px;background:var(--card2);border:none;color:var(--accent);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.portion-btn:active{background:var(--accent);color:#1a1108;}
.portion-num{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--text);padding:0 8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.sync-dot.ok{background:var(--green);}.sync-dot.busy{background:var(--accent);animation:pulse 1s infinite;}.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div id="api-screen">
  <div class="card api-card" style="position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:52px;margin-bottom:10px;">🍳</div>
      <h1 class="serif" style="font-size:30px;color:var(--accent);letter-spacing:-.5px;">KochApp</h1>
      <p style="color:var(--muted);font-size:13px;margin-top:5px;">Deine persönliche Küchen-Assistentin mit KI</p>
    </div>
    <label class="label">Anthropic API-Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-…" style="margin-bottom:12px;font-size:13px;">
    <label class="label">JSONBin API-Key</label>
    <input type="password" id="jb-key-input" placeholder="$2a$10$…" style="margin-bottom:8px;font-size:13px;">
    <p style="font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.6;">🔒 Beide Keys werden nur lokal gespeichert.<br>Anthropic: <a href="https://console.anthropic.com/keys" target="_blank" style="color:var(--accent);text-decoration:none;">console.anthropic.com/keys</a></p>
    <div id="api-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;">⚠️ Bitte beide API-Keys eingeben.</div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px;font-size:15px;" onclick="startApp()">App starten →</button>
    <div class="divider"></div>
    <p style="font-size:11px;color:var(--muted);text-align:center;line-height:1.7;">Gehostet auf Netlify · Als App auf Homescreen speichern</p>
  </div>
</div>
<div id="app" style="display:none;position:relative;z-index:1;">
  <header>
    <div class="header-top">
      <h1 class="serif" style="font-size:24px;color:var(--accent);letter-spacing:-.3px;">🍳 KochApp <span style="font-size:11px;color:var(--muted);font-family:'Outfit',sans-serif;font-weight:400;letter-spacing:0;">v7.2</span></h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="sync-status" style="font-size:11px;color:var(--muted);display:flex;align-items:center;"></span>
        <button class="btn btn-ghost" style="font-size:11px;padding:7px 12px;" onclick="showKeyModal()">🔑 Key</button>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" id="nav-vesper" onclick="showTab('vesper')"><span class="ni">🍎</span>Vesper</button>
      <button class="nav-btn" id="nav-woche" onclick="showTab('woche')"><span class="ni">📅</span>Wochenplan</button>
    </nav>
  </header>
  <main>
    <!-- VESPER Mo-Fr -->
    <div id="page-vesper" class="page active">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span id="vesper-count" style="color:var(--muted);font-size:13px;"></span>
        <button class="btn btn-primary" style="font-size:12px;padding:8px 14px;" onclick="openVesperPlan()">Planen →</button>
      </div>
      <div id="vesper-grid"></div>
    </div>
    <!-- WOCHENPLAN nur Mittag -->
    <div id="page-woche" class="page">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span id="week-count" style="color:var(--muted);font-size:13px;"></span>
        <button class="btn btn-primary" style="font-size:12px;padding:8px 14px;" onclick="openAutoPlan()">Planen →</button>
      </div>
      <div id="week-grid"></div>
    </div>
    <!-- REZEPTE mit Unterregisterkarten -->
    <div id="page-rezepte" class="page">
      <div class="sub-nav">
        <button class="sub-btn active" id="sub-mittag" onclick="showSubTab('mittag')">🍽️ Mittagessen</button>
        <button class="sub-btn" id="sub-vesper-r" onclick="showSubTab('vesper-r')">🍎 Vesper</button>
      </div>
      <div id="sub-page-mittag">
        <div id="mittag-toolbar" style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span id="recipe-count" style="color:var(--muted);font-size:13px;"></span>

          </div>
          <input type="text" id="recipe-search" placeholder="🔍 Suchen z.B. Nudeln, Zucchini…" oninput="filterRecipes(this.value)" style="margin-bottom:0;">
        </div>
        <div id="recipe-list"></div>
        <div id="recipe-detail" style="display:none;"></div>
        <div id="add-recipe-form" style="display:none;"></div>
      </div>
      <div id="sub-page-vesper-r" style="display:none;">
        <div id="vesper-r-toolbar" style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span id="vesper-recipe-count" style="color:var(--muted);font-size:13px;"></span>

          </div>
          <div style="display:flex;gap:8px;">
            <button class="sub-btn active" id="vesper-col-salzig" onclick="setVesperCol('salzig')">🧀 Salzig</button>
            <button class="sub-btn" id="vesper-col-suess" onclick="setVesperCol('suess')">🍰 Süß</button>
          </div>
        </div>
        <div id="vesper-recipe-list"></div>
        <div id="vesper-recipe-detail" style="display:none;"></div>
        <div id="add-vesper-recipe-form" style="display:none;"></div>
      </div>
    </div>
    <!-- EINKAUF -->
    <div id="page-einkauf" class="page">
      <div class="card" style="margin-bottom:16px;">
        <h3 style="font-size:14px;margin-bottom:10px;font-weight:600;">➕ Artikel hinzufügen</h3>
        <div style="display:grid;grid-template-columns:1fr 90px;gap:8px;margin-bottom:8px;">
          <input type="text" id="new-item" placeholder="Artikel" onkeydown="if(event.key==='Enter')addManualItem()">
          <input type="text" id="new-amount" placeholder="Menge" onkeydown="if(event.key==='Enter')addManualItem()">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="addManualItem()">Hinzufügen</button>
      </div>
      <div id="shopping-list-container"></div>
    </div>
  </main>
  <div class="bottom-bar">
    <button class="bottom-btn" id="btn-rezepte" onclick="showTab('rezepte')"><span style="font-size:18px;">📖</span> Rezepte</button>
    <div id="btn-add-center" style="display:none;flex-direction:column;gap:5px;align-items:center;">
      <button class="btn btn-primary" id="btn-add-mittag" onclick="showAddRecipe('mittag')" style="font-size:12px;padding:8px 14px;display:none;">+ Mittagessen</button>
      <button class="btn btn-primary" id="btn-add-vesper-b" onclick="showAddRecipe('vesper')" style="font-size:12px;padding:8px 14px;display:none;">+ Vesper</button>
    </div>
    <button class="bottom-btn" id="btn-einkauf" onclick="showTab('einkauf')"><span style="font-size:18px;">🛒</span> Einkauf</button>
  </div>
</div>
<div id="picker-modal" style="display:none;"></div>
<div id="autoplan-modal" style="display:none;"></div>
<div id="vesperplan-modal" style="display:none;"></div>
<div id="toast" class="toast" style="display:none;"></div>
<script>
const TYPES={vegetarian:{icon:'🥦',label:'Vegetarisch',color:'var(--veg)',css:'veg'},meat:{icon:'🥩',label:'Fleisch',color:'var(--meat)',css:'meat'},fish:{icon:'🐟',label:'Fisch',color:'var(--fish)',css:'fish'}};
const typeIcon=t=>(TYPES[t]||TYPES.vegetarian).icon;
const typeBadge=t=>{const d=TYPES[t]||TYPES.vegetarian;return`<span class="type-badge ${d.css}">${d.icon} ${d.label}</span>`;};
const slotClass=t=>t?(TYPES[t]||TYPES.vegetarian).css+'-slot':'';
let API_KEY='',recipes=[],vesperRecipes=[],shoppingList=[],weekPlan={},vesperPlan={},formData={},formContext='mittag',currentTab='vesper',currentSubTab='mittag';
const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'],WEEKDAYS=['Mo','Di','Mi','Do','Fr'];
let daySettings={Mo:{maxMin:40},Di:{maxMin:40},Mi:{maxMin:40},Do:{maxMin:40},Fr:{maxMin:null}};
function setSyncStatus(s,t){const el=document.getElementById('sync-status');if(!el)return;el.innerHTML=`<span class="sync-dot ${s}"></span>${t}`;}
async function saveAll(){
  setSyncStatus('busy','Speichert…');
  try{
    const data={mittag:recipes,vesper:vesperRecipes};
    await jbSave(data);
    localStorage.setItem('ka_shopping',JSON.stringify(shoppingList));
    localStorage.setItem('ka_week',JSON.stringify(weekPlan));
    localStorage.setItem('ka_vesperplan',JSON.stringify(vesperPlan));
    localStorage.setItem('ka_daysettings',JSON.stringify(daySettings));
    setSyncStatus('ok','Gespeichert');setTimeout(()=>{const el=document.getElementById('sync-status');if(el)el.innerHTML='';},2000);
  }catch(e){setSyncStatus('err','Fehler');}
}
async function loadAll(){
  const jbData=await jbLoad();
  if(jbData&&jbData.mittag){recipes=jbData.mittag;vesperRecipes=jbData.vesper||[];}
  else{recipes=defaultRecipes();vesperRecipes=defaultVesperRecipes();}
  try{shoppingList=JSON.parse(localStorage.getItem('ka_shopping'))||[];}catch(e){shoppingList=[];}
  try{weekPlan=JSON.parse(localStorage.getItem('ka_week'))||{};}catch(e){weekPlan={};}
  try{vesperPlan=JSON.parse(localStorage.getItem('ka_vesperplan'))||{};}catch(e){vesperPlan={};}
  try{const d=JSON.parse(localStorage.getItem('ka_daysettings'));if(d)daySettings=d;}catch(e){}
}
function defaultRecipes(){return[{id:'r1',name:'Spaghetti Carbonara',image:null,time:'25 min',servings:2,type:'meat',tags:['Pasta','Schnell'],ingredients:[{name:'Spaghetti',amount:'200g'},{name:'Pancetta',amount:'100g'},{name:'Eier',amount:'2 Stück'},{name:'Parmesan',amount:'60g'},{name:'Pfeffer',amount:'n. B.'}],steps:['Spaghetti in Salzwasser al dente kochen.','Pancetta knusprig braten.','Eier mit Parmesan verquirlen.','Pasta vom Herd, Ei-Mix unterrühren.','Mit Pfeffer servieren.']},{id:'r2',name:'Avocado Toast',image:null,time:'10 min',servings:1,type:'vegetarian',tags:['Schnell'],ingredients:[{name:'Vollkornbrot',amount:'2 Scheiben'},{name:'Avocado',amount:'1 Stück'},{name:'Zitronensaft',amount:'1 EL'},{name:'Chiliflocken',amount:'Prise'}],steps:['Brot rösten.','Avocado zerdrücken und würzen.','Auf Toast verteilen.','Mit Chili bestreuen.']},{id:'r3',name:'Lachsfilet mit Gemüse',image:null,time:'30 min',servings:2,type:'fish',tags:['Gesund'],ingredients:[{name:'Lachsfilet',amount:'300g'},{name:'Zucchini',amount:'1 Stück'},{name:'Zitrone',amount:'1/2'},{name:'Olivenöl',amount:'2 EL'},{name:'Dill',amount:'n. B.'}],steps:['Ofen auf 200°C vorheizen.','Gemüse schneiden und auf Backblech legen.','Lachs würzen und mit Zitrone beträufeln.','Alles 20 Min. backen.','Mit frischem Dill servieren.']}];}
function defaultVesperRecipes(){return[{id:'v1',name:'Apfel mit Käse',image:null,time:'5 min',servings:1,type:'vegetarian',tags:['Schnell','Kinder'],ingredients:[{name:'Apfel',amount:'1 Stück'},{name:'Käse',amount:'2 Scheiben'}],steps:['Apfel in Spalten schneiden.','Mit Käse servieren.']}];}
const JSONBIN_ID='69bfcf84aa77b81da909b064';
let JB_KEY='';
async function jbLoad(){try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{'X-Master-Key':JB_KEY,'X-Bin-Meta':false}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
async function jbSave(data){console.log('jbSave called, JB_KEY length:',JB_KEY.length);try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JB_KEY},body:JSON.stringify(data)});console.log('jbSave status:',r.status);}catch(e){console.warn('JSONBin save failed',e);}}

let keyVisible=false;

  keyVisible=!keyVisible;

  if(el){el.textContent=keyVisible?API_KEY:API_KEY.slice(0,8)+'…'+API_KEY.slice(-4);}

}
function copyKey(){
  navigator.clipboard.writeText(API_KEY).then(()=>toast('✓ Key kopiert!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=API_KEY;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Key kopiert!');
  });
}
function exportJSON(){
  const data={
    exportDate: new Date().toLocaleDateString('de-DE'),
    version: 'v7.2',
    mittagessen: recipes,
    vesper: vesperRecipes
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='KochApp_Rezepte_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ JSON exportiert!');
}

function exportPDF(){

    lines.push('');

    r.ingredients.forEach(ing=>lines.push('   • '+ing.amount+' '+ing.name));

    r.steps.forEach((s,si)=>lines.push('   '+(si+1)+'. '+s));
  });

  lines.push('🍎 VESPER ('+vesperRecipes.length+' Rezepte)');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>KochApp Rezepte</title>
  <style>
    body{font-family:'Helvetica Neue',Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px;color:#2a1f0a;line-height:1.6;}

    li{font-size:14px;margin-bottom:3px;}

    @media print{body{margin:20px;}}
  </style></head><body>
  <h1>🍳 KochApp — Rezepte</h1>
  <p class="date">Exportiert am ${new Date().toLocaleDateString('de-DE')}</p>
  <h2>🍽️ Mittagessen (${recipes.length})</h2>
  ${recipes.map(r=>`<div class="recipe">
    <div class="recipe-title">${r.name} ${ (TYPES[r.type]||TYPES.vegetarian).icon}</div>
    <div class="meta">⏱ ${r.time} &nbsp;·&nbsp; 👤 ${r.servings} Port. &nbsp;·&nbsp; ${(r.tags||[]).join(', ')}</div>
    <div class="section">Zutaten</div>
    <ul>${r.ingredients.map(i=>`<li>${i.amount} ${i.name}</li>`).join('')}</ul>
    <div class="section">Zubereitung</div>
    <ol>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
  </div>`).join('')}
  <h2>🍎 Vesper (${vesperRecipes.length})</h2>
  ${vesperRecipes.map(r=>`<div class="recipe">
    <div class="recipe-title">${r.name} ${(TYPES[r.type]||TYPES.vegetarian).icon}</div>
    <div class="meta">⏱ ${r.time} &nbsp;·&nbsp; 👤 ${r.servings} Port. &nbsp;·&nbsp; ${(r.tags||[]).join(', ')}</div>
    <div class="section">Zutaten</div>
    <ul>${r.ingredients.map(i=>`<li>${i.amount} ${i.name}</li>`).join('')}</ul>
    <div class="section">Zubereitung</div>
    <ol>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
  </div>`).join('')}
  </body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(()=>w.print(),500);
  toast('✓ PDF wird geöffnet — Drucken → Als PDF speichern');

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',2400);}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function parseMinutes(t){if(!t)return null;const m=t.match(/(\d+)/);return m?parseInt(m[1]):null;}
function scaleAmount(amount,factor){if(!amount||factor===1)return amount;const m=amount.match(/^(\d+([.,]\d+)?)/);if(!m)return amount;const orig=parseFloat(m[1].replace(',','.'));const scaled=Math.round(orig*factor*10)/10;return amount.replace(m[1],scaled%1===0?String(scaled):String(scaled).replace('.',','));}
function recipeCardHTML(r,ctx){const d=TYPES[r.type]||TYPES.vegetarian;return`<div class="card recipe-card" style="margin-bottom:10px;cursor:pointer;display:flex;gap:14px;align-items:center;padding:14px 16px;" onclick="showRecipeDetail('${r.id}','${ctx}')"><div style="width:52px;height:52px;border-radius:12px;background:${d.color}22;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;">${ctx==='vesper'?'🍎':d.icon}</div><div style="flex:1;min-width:0;"><div class="serif" style="font-size:17px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(r.name)}</div><div style="font-size:12px;color:var(--muted);">⏱ ${r.time}</div></div><span style="color:var(--muted);font-size:22px;padding-right:2px;">›</span></div>`;}

function filterRecipes(q){
  const query=q.toLowerCase().trim();
  const filtered=query?recipes.filter(r=>
    r.name.toLowerCase().includes(query)||
    (r.tags||[]).some(t=>t.toLowerCase().includes(query))||
    (r.ingredients||[]).some(i=>i.name.toLowerCase().includes(query))
  ):recipes;
  document.getElementById('recipe-list').innerHTML=filtered.length
    ?filtered.map(r=>recipeCardHTML(r,'mittag')).join('')
    :`<div style="text-align:center;padding:40px 20px;color:var(--muted);"><div style="font-size:36px;margin-bottom:10px;">🔍</div><p>Keine Rezepte gefunden für "${q}"</p></div>`;
}

function addIngToShop(id,ctx,portions){const pool=ctx==='vesper'?vesperRecipes:recipes;const r=pool.find(x=>x.id===id),factor=(portions||r.servings)/r.servings;r.ingredients.forEach(ing=>shoppingList.push({id:'s'+Date.now()+Math.random().toString(36).slice(2),name:ing.name,amount:scaleAmount(ing.amount,factor),source:r.name+(factor!==1?` (${portions} Port.)`:''),checked:false}));saveAll();toast('✓ Zutaten zur Einkaufsliste hinzugefügt!');}

async function handlePhoto(e,ctx){
  const file=e.target.files[0];if(!file)return;formData.image=URL.createObjectURL(file);
  const ov=document.getElementById('ai-overlay-'+ctx);if(ov)ov.style.display='flex';
  const reader=new FileReader();
  reader.onload=async(ev)=>{const b64=ev.target.result.split(',')[1];
    try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:`Analysiere dieses Essensfoto. Antworte NUR mit validem JSON:\n{"name":"Name","type":"vegetarian OR meat OR fish","time":"10 min","servings":2,"tags":["Tag"],"ingredients":[{"name":"Zutat","amount":"Menge"}],"steps":["Schritt"]}\nMax 5 Schritte auf Deutsch.`}]}]})});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const data=await resp.json();const p=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
      if(p.name)formData.name=p.name;if(p.type&&TYPES[p.type])formData.type=p.type;if(p.time)formData.time=p.time;if(p.servings)formData.servings=String(p.servings);if(p.tags)formData.tags=p.tags.join(', ');if(p.ingredients?.length)formData.ingredients=p.ingredients;if(p.steps?.length)formData.steps=p.steps;
    }catch(err){formData.aiError='⚠️ KI-Analyse fehlgeschlagen: '+(err.message||'Fehler');}
    renderAddForm(ctx);if(formData.aiError){const el=document.getElementById('ai-error-'+ctx);if(el){el.style.display='block';el.textContent=formData.aiError;}}
  };reader.readAsDataURL(file);
}
function saveRecipe(ctx){
  syncFields();if(!formData.name.trim()){toast('⚠️ Bitte Rezeptname eingeben');return;}
  const r={id:formData.editMode?formData.id:(ctx==='vesper'?'v':'r')+Date.now(),name:formData.name.trim(),type:formData.type||'vegetarian',time:formData.time||'?',servings:parseInt(formData.servings)||2,tags:formData.tags.split(',').map(t=>t.trim()).filter(Boolean),ingredients:formData.ingredients.filter(i=>i.name.trim()),steps:formData.steps.filter(s=>s.trim()),image:null,vesperKat:ctx==='vesper'?(formData.vesperKat||'salzig'):undefined};
  if(formData.editMode){
    if(ctx==='vesper'){const idx=vesperRecipes.findIndex(x=>x.id===r.id);if(idx>=0)vesperRecipes[idx]=r;}
    else{const idx=recipes.findIndex(x=>x.id===r.id);if(idx>=0)recipes[idx]=r;}
    toast('✓ Rezept aktualisiert!');
  } else {
    if(ctx==='vesper')vesperRecipes.push(r);else recipes.push(r);
    toast('✓ Rezept gespeichert!');
  }
  saveAll();backToList(ctx);
}

function openAutoPlan(){
  const counts=Object.fromEntries(Object.keys(TYPES).map(t=>[t,recipes.filter(r=>r.type===t).length]));
  const modal=document.getElementById('autoplan-modal');modal.style.display='block';
  modal.innerHTML=`<div class="modal-overlay" onclick="closeAutoPlan()"><div class="modal-box" onclick="event.stopPropagation()"><div class="serif" style="font-size:20px;margin-bottom:4px;">✨ Wochenplan erstellen</div><p style="font-size:12px;color:var(--muted);margin-bottom:14px;">Mittag Mo–Fr automatisch befüllen<br>Verfügbar: ${Object.entries(TYPES).map(([t,d])=>`<span style="color:${d.color}">${d.icon} ${counts[t]}</span>`).join(' · ')}</p>${Object.entries(TYPES).map(([t,d])=>`<div class="plan-row"><label>${d.icon} ${d.label}gerichte</label><input type="number" id="plan-${t}" value="${t==='meat'?2:t==='fish'?1:2}" min="0" max="5"></div>`).join('')}<div style="height:1px;background:var(--border);margin:14px 0;"></div><div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">⏱ Max. Kochzeit pro Tag</div><div style="background:var(--surface);border-radius:12px;padding:10px 14px;margin-bottom:14px;">${WEEKDAYS.map(day=>{const maxMin=daySettings[day]?.maxMin;return`<div class="day-time-row"><div class="day-label">${day}</div><div class="time-input-wrap"><input type="number" id="dt-${day}" value="${maxMin||''}" min="10" max="240" placeholder="–" style="width:58px;padding:7px 6px;font-size:13px;text-align:center;" oninput="updateDayTime('${day}',this.value)"><span class="time-unit">min</span><button class="time-any-btn ${!maxMin?'active':''}" onclick="clearDayTime('${day}')">✨ beliebig</button></div></div>`;}).join('')}</div><div id="plan-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;"></div><button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="runAutoPlan()">Plan erstellen 🎲</button><button class="btn btn-ghost" style="width:100%;" onclick="closeAutoPlan()">Abbrechen</button></div></div>`;
}

function updateDayTime(day,val){const n=parseInt(val);daySettings[day]={maxMin:(val===''||isNaN(n))?null:n};saveAll();const btn=document.querySelector(`[onclick="clearDayTime('${day}')"]`);if(btn)btn.className='time-any-btn'+(daySettings[day].maxMin?'':' active');}
function clearDayTime(day){daySettings[day]={maxMin:null};saveAll();const inp=document.getElementById('dt-'+day);if(inp)inp.value='';const btn=document.querySelector(`[onclick="clearDayTime('${day}')"]`);if(btn)btn.className='time-any-btn active';}
function runAutoPlan(){
  const counts={};let total=0;for(const t of Object.keys(TYPES)){counts[t]=parseInt(document.getElementById('plan-'+t).value)||0;total+=counts[t];}
  const errEl=document.getElementById('plan-error');
  if(total>5){errEl.style.display='block';errEl.textContent='⚠️ Maximal 5 Gerichte (Mo–Fr).';return;}
  if(total===0){errEl.style.display='block';errEl.textContent='⚠️ Bitte mindestens 1 Gericht wählen.';return;}
  for(const[t,n]of Object.entries(counts)){if(n>0&&recipes.filter(r=>r.type===t).length===0){errEl.style.display='block';errEl.textContent=`⚠️ Keine ${TYPES[t].label}-Rezepte vorhanden!`;return;}}
  const shuffled=[...WEEKDAYS].sort(()=>Math.random()-.5);let idx=0;const assignments=[];
  for(const[t,n]of Object.entries(counts)){for(let i=0;i<n;i++)assignments.push({day:shuffled[idx++],type:t});}
  let skipped=0;function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
  for(const{day,type}of assignments){const maxMin=daySettings[day]?.maxMin;let pool=recipes.filter(r=>r.type===type);if(maxMin){const f=pool.filter(r=>{const m=parseMinutes(r.time);return m===null||m<=maxMin;});if(f.length>0)pool=f;else skipped++;}weekPlan[day]=pick(pool);}
  saveAll();closeAutoPlan();renderWeek();toast(skipped>0?`✓ Plan erstellt! (${skipped} über Zeitlimit)`:`✓ ${total} Gerichte geplant!`);
}

function assignSlot(day,rid){weekPlan[day]=recipes.find(x=>x.id===rid);saveAll();closePicker();renderWeek();}
function openVesperPicker(day){const modal=document.getElementById('picker-modal');modal.style.display='block';modal.innerHTML=`<div class="modal-overlay" onclick="closePicker()"><div class="modal-box" onclick="event.stopPropagation()"><div class="serif" style="font-size:19px;margin-bottom:4px;">Vesper wählen</div><p style="font-size:12px;color:var(--muted);margin-bottom:16px;">${day}</p>${vesperRecipes.length?vesperRecipes.map(r=>`<div class="card recipe-card" style="cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:13px;" onclick="assignVesperSlot('${day}','${r.id}')"><div style="font-size:24px;">${typeIcon(r.type)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${escHtml(r.name)}</div><div style="font-size:11px;color:var(--muted);">${r.time} · ${r.servings} Port.</div></div>${typeBadge(r.type)}</div>`).join(''):`<p style="color:var(--muted);text-align:center;padding:20px;">Noch keine Vesper-Rezepte.<br><span style="font-size:11px;">📖 Rezepte → Vesper → Hinzufügen</span></p>`}<button class="btn btn-ghost" style="width:100%;margin-top:10px;" onclick="closePicker()">Abbrechen</button></div></div>`;}
function assignVesperSlot(day,rid){vesperPlan[day]=vesperRecipes.find(x=>x.id===rid);saveAll();closePicker();renderVesper();}
</script>
