[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://api.anthropic.com; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
